name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore SessionMigrate.sln

      - name: Build (Release)
        run: dotnet build SessionMigrate.sln -c Release --no-restore

      - name: Verify format
        run: dotnet format SessionMigrate.sln --verify-no-changes --no-restore

      - name: Test (Release)
        run: dotnet test SessionMigrate.sln -c Release --no-restore --verbosity normal
